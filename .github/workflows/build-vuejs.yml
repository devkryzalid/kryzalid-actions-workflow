name: Reusable Vue.js Workflow

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment (staging or production)'
        required: true
        type: string
      node_version:
        description: 'Node.js version to use via nvm (e.g. 16.20.2, 20.18.0)'
        required: false
        type: string
        default: '16.20.2'
      pm2_app_name:
        description: 'Nom du process PM2 à (re)démarrer'
        required: false
        type: string
        default: 'kryzahub-server'
      pm2_entrypoint:
        description: 'Chemin du fichier d''entrée Node lancé par PM2'
        required: false
        type: string
        default: 'server/index.js'
      server_port:
        description: 'Port HTTP exposé par le serveur Node'
        required: false
        type: string
        default: '3000'
    secrets:
      # Staging secrets
      SSH_PRIVATE_KEY_STAGING:
        required: false
      SSH_USER_STAGING:
        required: false
      SERVER_HOST_STAGING:
        required: false
      PROJECT_PATH_STAGING:
        required: false
      # Production secrets
      SSH_PRIVATE_KEY_PROD:
        required: false
      SSH_USER_PROD:
        required: false
      SERVER_HOST_PROD:
        required: false
      PROJECT_PATH_PROD:
        required: false
      # Common secrets
      SLACK_WEBHOOK_URL:
        required: true

permissions:
  contents: read

concurrency:
  group: deploy-vuejs-${{ inputs.environment }}-${{ github.repository }}
  cancel-in-progress: false

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        shell: bash
        run: |
          if [ "${{ inputs.environment }}" = "staging" ]; then
            if [ -z "${{ secrets.SSH_PRIVATE_KEY_STAGING }}" ] || \
               [ -z "${{ secrets.SSH_USER_STAGING }}" ] || \
               [ -z "${{ secrets.SERVER_HOST_STAGING }}" ] || \
               [ -z "${{ secrets.PROJECT_PATH_STAGING }}" ]; then
              echo "Missing required staging secrets"
              exit 1
            fi
          else
            if [ -z "${{ secrets.SSH_PRIVATE_KEY_PROD }}" ] || \
               [ -z "${{ secrets.SSH_USER_PROD }}" ] || \
               [ -z "${{ secrets.SERVER_HOST_PROD }}" ] || \
               [ -z "${{ secrets.PROJECT_PATH_PROD }}" ]; then
              echo "Missing required production secrets"
              exit 1
            fi
          fi

  build:
    needs: validate-secrets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Set up SSH key
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
        with:
          ssh-private-key: ${{ inputs.environment == 'staging' && secrets.SSH_PRIVATE_KEY_STAGING || secrets.SSH_PRIVATE_KEY_PROD }}

      - name: Configure SSH known hosts
        shell: bash
        env:
          SERVER_HOST: ${{ inputs.environment == 'staging' && secrets.SERVER_HOST_STAGING || secrets.SERVER_HOST_PROD }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Deploy, build and start server
        shell: bash
        env:
          SSH_USER: ${{ inputs.environment == 'staging' && secrets.SSH_USER_STAGING || secrets.SSH_USER_PROD }}
          SERVER_HOST: ${{ inputs.environment == 'staging' && secrets.SERVER_HOST_STAGING || secrets.SERVER_HOST_PROD }}
          PROJECT_PATH: ${{ inputs.environment == 'staging' && secrets.PROJECT_PATH_STAGING || secrets.PROJECT_PATH_PROD }}
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=3 \
            "$SSH_USER@$SERVER_HOST" \
            bash -s -- \
              "$PROJECT_PATH" \
              "${{ github.ref_name }}" \
              "${{ inputs.environment }}" \
              "${{ inputs.node_version }}" \
              "${{ inputs.pm2_app_name }}" \
              "${{ inputs.pm2_entrypoint }}" \
              "${{ inputs.server_port }}" <<'BASH'
          set -euo pipefail
          PROJECT_PATH="$1"
          BRANCH="$2"
          ENVIRONMENT="$3"
          NODE_VERSION="$4"
          PM2_APP="$5"
          PM2_ENTRY="$6"
          SERVER_PORT="$7"

          # Chargement de nvm
          if [ -s "$HOME/.nvm/nvm.sh" ]; then
            . "$HOME/.nvm/nvm.sh"
            nvm use "$NODE_VERSION" > /dev/null
          fi

          if ! command -v npm >/dev/null 2>&1; then
            echo "❌ npm introuvable. Vérifiez l'installation de Node.js."
            exit 1
          fi
          echo "Node: $(node -v) | npm: $(npm -v)"

          git config --global --add safe.directory "$PROJECT_PATH" || true
          cd "$PROJECT_PATH"

          # Récupération du code (reset --hard pour un état déterministe)
          echo "📥 Récupération du code (reset --hard origin/${BRANCH})..."
          git fetch --all --prune
          git reset --hard "origin/${BRANCH}"

          # Installation des dépendances : toujours npm ci (déterministe et rapide
          # avec un cache npm chaud — la détection précédente sur diff HEAD^ HEAD
          # était cassée sur rebase/cherry-pick).
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            echo "📦 npm ci"
            npm ci
          else
            echo "⚠️  Aucun lockfile → npm install"
            npm install
          fi

          # Création du fichier .env.server
          echo "⚙️ Configuration .env.server..."
          {
            echo "SERVER_ENV=$ENVIRONMENT"
            echo "PORT=$SERVER_PORT"
            echo "CACHE_DURATION=300000"
          } > .env.server

          # Build de l'application Vue.js
          echo "🔨 Build en cours..."
          npm run build

          # Vérification que le build a produit des fichiers
          if [ ! -d "dist" ] || [ -z "$(ls -A dist 2>/dev/null)" ]; then
            echo "❌ ERREUR: dist/ est vide ou n'existe pas après le build"
            exit 1
          fi
          echo "✅ Build terminé"

          # Détermination de NODE_ENV
          if [ "$ENVIRONMENT" = "staging" ]; then
            NODE_ENV_VALUE="development"
          else
            NODE_ENV_VALUE="production"
          fi

          # Reload (zero-downtime) si le process existe, sinon start.
          # On évite `pm2 update` qui redémarre TOUS les processus PM2 du serveur.
          echo "🔄 (Re)démarrage PM2 de $PM2_APP..."
          if pm2 describe "$PM2_APP" >/dev/null 2>&1; then
            NODE_ENV="$NODE_ENV_VALUE" pm2 reload "$PM2_APP" --update-env
          else
            NODE_ENV="$NODE_ENV_VALUE" pm2 start "$PM2_ENTRY" --name "$PM2_APP"
          fi

          echo "✅ Serveur PM2 démarré"
          BASH

      - name: Verify server status
        shell: bash
        env:
          SSH_USER: ${{ inputs.environment == 'staging' && secrets.SSH_USER_STAGING || secrets.SSH_USER_PROD }}
          SERVER_HOST: ${{ inputs.environment == 'staging' && secrets.SERVER_HOST_STAGING || secrets.SERVER_HOST_PROD }}
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=3 \
            "$SSH_USER@$SERVER_HOST" \
            bash -s -- "${{ inputs.node_version }}" "${{ inputs.pm2_app_name }}" <<'BASH'
          set -euo pipefail
          NODE_VERSION="$1"
          PM2_APP="$2"

          if [ -s "$HOME/.nvm/nvm.sh" ]; then
            . "$HOME/.nvm/nvm.sh"
            nvm use "$NODE_VERSION" > /dev/null
          fi

          echo "📊 Statut PM2 :"
          pm2 status

          # Parse le status sans dépendre de python : pm2 jlist | jq
          STATUS="unknown"
          if command -v jq >/dev/null 2>&1; then
            STATUS=$(pm2 jlist 2>/dev/null \
              | jq -r --arg name "$PM2_APP" '.[] | select(.name==$name) | .pm2_env.status' \
              | head -n1)
          else
            # Fallback : grep brut sur la ligne du process
            STATUS=$(pm2 jlist 2>/dev/null \
              | tr ',' '\n' \
              | grep -A1 "\"name\":\"$PM2_APP\"" \
              | grep '"status"' \
              | head -n1 \
              | sed 's/.*"status":"\([^"]*\)".*/\1/')
          fi
          STATUS="${STATUS:-not_found}"

          if [ "$STATUS" = "online" ]; then
            echo "✅ $PM2_APP est online"
          else
            echo "❌ $PM2_APP statut: $STATUS"
            exit 1
          fi
          BASH

  notify:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Préparer les variables du message
        id: meta
        shell: bash
        env:
          COMMIT_MSG_RAW: ${{ github.event.head_commit.message }}
          STACK_NAME: Vue.js
          STACK_LOGO: https://vuejs.org/images/logo.png
        run: |
          IS_FAILURE="${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}"
          [ "${{ inputs.environment }}" = "production" ] && IS_PROD="true" || IS_PROD="false"

          if [ "$IS_FAILURE" = "true" ]; then
            ICON="❌"
            [ "$IS_PROD" = "true" ] && COLOR="#a01515" || COLOR="#d97706"
          else
            ICON="✅"
            [ "$IS_PROD" = "true" ] && COLOR="#1d7e2a" || COLOR="#3ec55c"
          fi
          [ "$IS_PROD" = "true" ] && ENV_LABEL="🚀 PRODUCTION" || ENV_LABEL="🚧 STAGING"

          DEPLOY_DATE=$(date '+%d/%m/%Y %H:%M')
          COMMIT_MSG=$(printf '%s' "$COMMIT_MSG_RAW" | head -1 | sed 's/\\/\\\\/g; s/"/\\"/g' | tr -d '\r')
          {
            echo "color=$COLOR"
            echo "icon=$ICON"
            echo "env_label=$ENV_LABEL"
            echo "deploy_date=$DEPLOY_DATE"
            echo "commit_msg=$COMMIT_MSG"
            echo "stack_name=$STACK_NAME"
            echo "stack_logo=$STACK_LOGO"
          } >> "$GITHUB_OUTPUT"

      - name: Notification Slack
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [{
                "color": "${{ steps.meta.outputs.color }}",
                "author_name": "${{ steps.meta.outputs.stack_name }}",
                "author_icon": "${{ steps.meta.outputs.stack_logo }}",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "${{ steps.meta.outputs.icon }} ${{ steps.meta.outputs.env_label }}",
                      "emoji": true
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      { "type": "mrkdwn", "text": "*Repo*\n<${{ github.server_url }}/${{ github.repository }}|${{ github.repository }}>" },
                      { "type": "mrkdwn", "text": "*Branche*\n`${{ github.ref_name }}`" },
                      { "type": "mrkdwn", "text": "*Auteur*\n${{ github.event.head_commit.author.name }}" },
                      { "type": "mrkdwn", "text": "*Commit*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>" }
                    ]
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "💬 _${{ steps.meta.outputs.commit_msg }}_"
                    }
                  },
                  {
                    "type": "context",
                    "elements": [
                      { "type": "mrkdwn", "text": "📅 ${{ steps.meta.outputs.deploy_date }} • Lancé par ${{ github.actor }} • <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Voir le run>" }
                    ]
                  }
                ]
              }]
            }
