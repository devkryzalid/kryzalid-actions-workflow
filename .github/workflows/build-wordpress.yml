name: Workflow WordPress Réutilisable

on:
  workflow_call:
    inputs:
      environment:
        description: "Environnement cible (staging ou production)"
        required: true
        type: string
    secrets:
      # Secrets de staging
      SSH_PRIVATE_KEY_STAGING:
        required: false
      SSH_USER_STAGING:
        required: false
      SERVER_HOST_STAGING:
        required: false
      PROJECT_PATH_STAGING:
        required: false
      # Secrets de production
      SSH_PRIVATE_KEY_PROD:
        required: false
      SSH_USER_PROD:
        required: false
      SERVER_HOST_PROD:
        required: false
      PROJECT_PATH_PROD:
        required: false
      # Secrets communs
      SLACK_WEBHOOK_URL:
        required: true

permissions:
  contents: read

concurrency:
  group: deploy-wp-${{ inputs.environment }}-${{ github.repository }}
  cancel-in-progress: false

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Vérification des secrets requis
        shell: bash
        run: |
          if [ "${{ inputs.environment }}" = "staging" ]; then
            if [ -z "${{ secrets.SSH_PRIVATE_KEY_STAGING }}" ] || \
               [ -z "${{ secrets.SSH_USER_STAGING }}" ] || \
               [ -z "${{ secrets.SERVER_HOST_STAGING }}" ] || \
               [ -z "${{ secrets.PROJECT_PATH_STAGING }}" ]; then
              echo "Secrets de staging manquants"
              exit 1
            fi
          else
            if [ -z "${{ secrets.SSH_PRIVATE_KEY_PROD }}" ] || \
               [ -z "${{ secrets.SSH_USER_PROD }}" ] || \
               [ -z "${{ secrets.SERVER_HOST_PROD }}" ] || \
               [ -z "${{ secrets.PROJECT_PATH_PROD }}" ]; then
              echo "Secrets de production manquants"
              exit 1
            fi
          fi

  build:
    needs: validate-secrets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Définition du mode de build
        id: env
        shell: bash
        run: |
          if [ "${{ inputs.environment }}" = "staging" ]; then
            echo "build_command=dev" >> "$GITHUB_OUTPUT"
          else
            echo "build_command=build" >> "$GITHUB_OUTPUT"
          fi

      - name: Configuration de la clé SSH
        uses: webfactory/ssh-agent@a6f90b1f127823b31d4d4a8d96047790581349bd # v0.9.1
        with:
          ssh-private-key: ${{ inputs.environment == 'staging' && secrets.SSH_PRIVATE_KEY_STAGING || secrets.SSH_PRIVATE_KEY_PROD }}

      - name: Configuration des hôtes SSH connus
        shell: bash
        env:
          SERVER_HOST: ${{ inputs.environment == 'staging' && secrets.SERVER_HOST_STAGING || secrets.SERVER_HOST_PROD }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Déploiement et build
        shell: bash
        env:
          SSH_USER: ${{ inputs.environment == 'staging' && secrets.SSH_USER_STAGING || secrets.SSH_USER_PROD }}
          SERVER_HOST: ${{ inputs.environment == 'staging' && secrets.SERVER_HOST_STAGING || secrets.SERVER_HOST_PROD }}
          PROJECT_PATH: ${{ inputs.environment == 'staging' && secrets.PROJECT_PATH_STAGING || secrets.PROJECT_PATH_PROD }}
        run: |
          BRANCH="${{ github.ref_name }}"
          MODE="${{ steps.env.outputs.build_command }}"  # "dev" en staging, "build" en prod

          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=3 \
            "$SSH_USER@$SERVER_HOST" \
            bash -s -- "$PROJECT_PATH" "$BRANCH" "$MODE" <<'BASH'
          set -euo pipefail
          ROOT="$1"     # racine du repo git
          BRANCH="$2"
          MODE="$3"

          # --- Git au ROOT du repo ---
          git config --global --add safe.directory "$ROOT" || true
          cd "$ROOT"
          git fetch --all --prune
          git reset --hard "origin/${BRANCH}"
          echo "✅ Git reset sur origin/${BRANCH} dans: $ROOT"

          # --- Trouver automatiquement le dossier qui contient package.json ---
          choose_workdir() {
            local base="$1"

            # 1) Si le root contient package.json → parfait
            if [ -f "$base/package.json" ]; then
              echo "$base"; return 0
            fi

            # 2) Priorité aux thèmes WordPress (courant dans tes projets)
            #    Cherche wp-content/themes/* contenant package.json (profondeur limitée)
            local theme_pkg
            theme_pkg="$(find "$base/wp-content/themes" -maxdepth 2 -mindepth 1 -type f -name package.json 2>/dev/null | head -n1 || true)"
            if [ -n "${theme_pkg:-}" ]; then
              dirname "$theme_pkg"; return 0
            fi

            # 3) Sinon, 1er package.json trouvé hors node_modules/vendor (profondeur raisonnable)
            local any_pkg
            any_pkg="$(find "$base" -maxdepth 4 \
                -path '*/node_modules/*' -prune -o \
                -path '*/vendor/*' -prune -o \
                -type f -name package.json -print | head -n1 || true)"
            if [ -n "${any_pkg:-}" ]; then
              dirname "$any_pkg"; return 0
            fi

            return 1
          }

          if ! WORKDIR="$(choose_workdir "$ROOT")"; then
            echo "❌ Aucun package.json trouvé sous $ROOT (hors node_modules/vendor)."
            echo "   Vérifie que PROJECT_PATH pointe bien sur le repo contenant le code front,"
            echo "   ou ajoute un input 'workdir' si tu veux forcer un sous-dossier."
            exit 1
          fi

          echo "📁 Dossier Node sélectionné: $WORKDIR"

          # --- Activer Node/npm (nvm si dispo, sinon global) ---
          if [ -s "$HOME/.nvm/nvm.sh" ]; then
            . "$HOME/.nvm/nvm.sh"
            [ -f "$WORKDIR/.nvmrc" ] && (cd "$WORKDIR" && nvm use) || true
          fi
          if ! command -v npm >/dev/null 2>&1; then
            echo "❌ npm introuvable dans PATH. Installe Node globalement ou charge nvm dans les shells non-interactifs."
            exit 1
          fi
          echo "Node: $(node -v) | npm: $(npm -v)"

          # --- Installer deps & build dans le WORKDIR ---
          cd "$WORKDIR"

          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            echo "📦 npm ci"
            npm ci
          else
            echo "⚠️  Aucun lockfile → npm install"
            npm install
          fi

          echo "🏗️  npm run $MODE"
          npm run "$MODE"

          echo "✅ Déploiement terminé."
          BASH

  notify:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Préparer les variables du message
        id: meta
        shell: bash
        env:
          COMMIT_MSG_RAW: ${{ github.event.head_commit.message }}
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            COLOR="#dc3545"; ICON="❌"; STATUS_TEXT="Échec"
          else
            COLOR="#36a64f"; ICON="✅"; STATUS_TEXT="Succès"
          fi
          if [ "${{ inputs.environment }}" = "production" ]; then
            ENV_ICON="🚀"
          else
            ENV_ICON="🚧"
          fi
          DEPLOY_DATE=$(date '+%d/%m/%Y %H:%M')
          COMMIT_MSG=$(printf '%s' "$COMMIT_MSG_RAW" | head -1 | sed 's/\\/\\\\/g; s/"/\\"/g' | tr -d '\r')
          {
            echo "color=$COLOR"
            echo "icon=$ICON"
            echo "status_text=$STATUS_TEXT"
            echo "env_icon=$ENV_ICON"
            echo "deploy_date=$DEPLOY_DATE"
            echo "commit_msg=$COMMIT_MSG"
          } >> "$GITHUB_OUTPUT"

      - name: Notification Slack
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [{
                "color": "${{ steps.meta.outputs.color }}",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "${{ steps.meta.outputs.icon }} WordPress — ${{ steps.meta.outputs.env_icon }} ${{ inputs.environment }} (${{ steps.meta.outputs.status_text }})",
                      "emoji": true
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      { "type": "mrkdwn", "text": "*Repo*\n<${{ github.server_url }}/${{ github.repository }}|${{ github.repository }}>" },
                      { "type": "mrkdwn", "text": "*Branche*\n`${{ github.ref_name }}`" },
                      { "type": "mrkdwn", "text": "*Auteur*\n${{ github.event.head_commit.author.name }}" },
                      { "type": "mrkdwn", "text": "*Commit*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>" }
                    ]
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "💬 _${{ steps.meta.outputs.commit_msg }}_"
                    }
                  },
                  {
                    "type": "context",
                    "elements": [
                      { "type": "mrkdwn", "text": "📅 ${{ steps.meta.outputs.deploy_date }} • Lancé par ${{ github.actor }} • <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Voir le run>" }
                    ]
                  }
                ]
              }]
            }
