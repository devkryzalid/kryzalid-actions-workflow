name: Build and Deploy Teedy Backend

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment (staging or production)'
        required: true
        type: string
    secrets:
      # Staging secrets
      SSH_PRIVATE_KEY_STAGING:
        required: false
      SSH_USER_STAGING:
        required: false
      SERVER_HOST_STAGING:
        required: false
      PROJECT_PATH_STAGING:
        required: false
      # Production secrets
      SSH_PRIVATE_KEY_PROD:
        required: false
      SSH_USER_PROD:
        required: false
      SERVER_HOST_PROD:
        required: false
      PROJECT_PATH_PROD:
        required: false
      # Common secrets
      SLACK_WEBHOOK_URL:
        required: true

permissions:
  contents: read

concurrency:
  group: deploy-teedy-backend-${{ inputs.environment }}-${{ github.repository }}
  cancel-in-progress: false

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        shell: bash
        run: |
          if [ "${{ inputs.environment }}" = "staging" ]; then
            if [ -z "${{ secrets.SSH_PRIVATE_KEY_STAGING }}" ] || \
               [ -z "${{ secrets.SSH_USER_STAGING }}" ] || \
               [ -z "${{ secrets.SERVER_HOST_STAGING }}" ] || \
               [ -z "${{ secrets.PROJECT_PATH_STAGING }}" ]; then
              echo "Missing required staging secrets"
              exit 1
            fi
          else
            if [ -z "${{ secrets.SSH_PRIVATE_KEY_PROD }}" ] || \
               [ -z "${{ secrets.SSH_USER_PROD }}" ] || \
               [ -z "${{ secrets.SERVER_HOST_PROD }}" ] || \
               [ -z "${{ secrets.PROJECT_PATH_PROD }}" ]; then
              echo "Missing required production secrets"
              exit 1
            fi
          fi

  build:
    needs: validate-secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Set up SSH key
        uses: webfactory/ssh-agent@a6f90b1f127823b31d4d4a8d96047790581349bd # v0.9.1
        with:
          ssh-private-key: ${{ inputs.environment == 'staging' && secrets.SSH_PRIVATE_KEY_STAGING || secrets.SSH_PRIVATE_KEY_PROD }}

      - name: Configure SSH known hosts
        shell: bash
        env:
          SERVER_HOST: ${{ inputs.environment == 'staging' && secrets.SERVER_HOST_STAGING || secrets.SERVER_HOST_PROD }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Pull latest code on server
        shell: bash
        env:
          SSH_USER: ${{ inputs.environment == 'staging' && secrets.SSH_USER_STAGING || secrets.SSH_USER_PROD }}
          SERVER_HOST: ${{ inputs.environment == 'staging' && secrets.SERVER_HOST_STAGING || secrets.SERVER_HOST_PROD }}
          PROJECT_PATH: ${{ inputs.environment == 'staging' && secrets.PROJECT_PATH_STAGING || secrets.PROJECT_PATH_PROD }}
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=3 \
            "$SSH_USER@$SERVER_HOST" \
            bash -s -- "$PROJECT_PATH" "${{ github.ref_name }}" <<'BASH'
          set -euo pipefail
          PROJECT_PATH="$1"
          BRANCH="$2"

          git config --global --add safe.directory "$PROJECT_PATH" || true
          cd "$PROJECT_PATH"

          echo "📥 Récupération du code..."
          git fetch --all --prune
          git reset --hard "origin/${BRANCH}"
          echo "✅ Reset sur origin/${BRANCH}"
          BASH

  notify:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Prepare notification metadata
        id: meta
        shell: bash
        env:
          COMMIT_MSG_RAW: ${{ github.event.head_commit.message }}
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            COLOR="#dc3545"; ICON="❌"; STATUS_TEXT="Échec"
          else
            COLOR="#36a64f"; ICON="✅"; STATUS_TEXT="Succès"
          fi
          if [ "${{ inputs.environment }}" = "production" ]; then
            ENV_ICON="🚀"
          else
            ENV_ICON="🚧"
          fi
          DEPLOY_DATE=$(date '+%d/%m/%Y %H:%M')
          COMMIT_MSG=$(printf '%s' "$COMMIT_MSG_RAW" | head -1 | sed 's/\\/\\\\/g; s/"/\\"/g' | tr -d '\r')
          {
            echo "color=$COLOR"
            echo "icon=$ICON"
            echo "status_text=$STATUS_TEXT"
            echo "env_icon=$ENV_ICON"
            echo "deploy_date=$DEPLOY_DATE"
            echo "commit_msg=$COMMIT_MSG"
          } >> "$GITHUB_OUTPUT"

      - name: Send Slack notification
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [{
                "color": "${{ steps.meta.outputs.color }}",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "${{ steps.meta.outputs.icon }} Teedy Backend — ${{ steps.meta.outputs.env_icon }} ${{ inputs.environment }} (${{ steps.meta.outputs.status_text }})",
                      "emoji": true
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      { "type": "mrkdwn", "text": "*Repo*\n<${{ github.server_url }}/${{ github.repository }}|${{ github.repository }}>" },
                      { "type": "mrkdwn", "text": "*Branche*\n`${{ github.ref_name }}`" },
                      { "type": "mrkdwn", "text": "*Auteur*\n${{ github.event.head_commit.author.name }}" },
                      { "type": "mrkdwn", "text": "*Commit*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>" }
                    ]
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "💬 _${{ steps.meta.outputs.commit_msg }}_"
                    }
                  },
                  {
                    "type": "context",
                    "elements": [
                      { "type": "mrkdwn", "text": "📅 ${{ steps.meta.outputs.deploy_date }} • Lancé par ${{ github.actor }} • <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Voir le run>" }
                    ]
                  }
                ]
              }]
            }
